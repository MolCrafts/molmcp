[project]
name = "molmcp-molexp"
version = "0.1.0"
description = "MolCrafts MCP plugin: molexp workspace catalog reader"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "BSD-3-Clause"}

authors = [
    { name = "Roy Kid", email = "lijichen365@gmail.com" }
]

keywords = ["mcp", "model-context-protocol", "molcrafts", "molexp"]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
]

# molexp is not yet on PyPI. Track the fork until the public org repo
# catches up; once molexp lands on PyPI, replace this direct reference
# with a version range.
dependencies = [
    "fastmcp>=3.0",
    "molcrafts-molmcp",
    "molexp",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
molmcp-molexp = "molmcp_molexp.cli:main"

[tool.uv.sources]
molcrafts-molmcp = { workspace = true }
molexp = { git = "https://github.com/Roy-Kid/molexp.git", branch = "dev" }

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"
